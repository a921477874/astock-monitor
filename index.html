<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A股智能监控 · 宝宝看盘</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0eb;
  --bg-card: #ffffff;
  --bg-alt: #faf8f5;
  --border: #e5ddd5;
  --border-light: #d4ccc4;
  --text: #1a1a2e;
  --text-dim: #6b7280;
  --text-muted: #9ca3af;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --gold: #b8860b;
  --gold-bg: #fefce8;
  --blue: #2563eb;
  --blue-bg: #eff6ff;
  --cyan: #0891b2;
  --purple: #7c3aed;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  min-height: 100vh;
}
/* ─── HEADER ─── */
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 18px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); line-height: 1.2; }
.badge {
  font-size: 10px; font-weight: 600; color: var(--gold);
  background: var(--gold-bg); border: 1px solid rgba(184,134,11,0.2);
  border-radius: 4px; padding: 2px 8px;
}
.header-right {
  display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-dim);
}
.header-right .date { font-size: 13px; font-weight: 600; color: var(--text); }
.status-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--green); animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.btn-refresh {
  font-size: 11px; font-weight: 500; cursor: pointer;
  padding: 4px 10px; border-radius: 5px;
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-dim); transition: all 0.15s; font-family: inherit;
}
.btn-refresh:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
.btn-refresh:disabled { opacity: 0.5; cursor: wait; }
/* ─── GRID ─── */
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
.span-12 { grid-column: span 12; }
.span-6 { grid-column: span 6; }
.span-4 { grid-column: span 4; }
.span-3 { grid-column: span 3; }
@media (max-width: 1024px) {
  .span-6 { grid-column: span 12; }
  .span-4 { grid-column: span 6; }
}
@media (max-width: 640px) {
  .span-4 { grid-column: span 12; }
  .span-3 { grid-column: span 12; }
  body { padding: 12px; }
  .header-right { flex-wrap: wrap; }
}
/* ─── CARD ─── */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
  box-shadow: var(--shadow); transition: box-shadow 0.2s, border-color 0.2s;
}
.card:hover { box-shadow: var(--shadow-hover); border-color: var(--border-light); }
.card-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 12px;
}
.card-title .icon { font-size: 14px; text-transform: none; letter-spacing: 0; }
.tag {
  font-size: 9px; font-weight: 500; padding: 1px 6px; border-radius: 3px;
  text-transform: none; letter-spacing: 0;
}
.tag-red { background: var(--red-bg); color: var(--red); }
.tag-green { background: var(--green-bg); color: var(--green); }
.tag-gold { background: var(--gold-bg); color: var(--gold); }
.tag-blue { background: var(--blue-bg); color: var(--blue); }
/* ─── MKT TABLE ─── */
.mkt-table { width:100%; border-collapse:collapse; }
.mkt-table th {
  text-align:left; font-size:10px; font-weight:500;
  color: var(--text-muted); padding:5px 6px;
  border-bottom:1px solid var(--border); white-space:nowrap;
}
.mkt-table td {
  font-size:13px; padding:7px 6px;
  border-bottom:1px solid rgba(229,221,213,0.5);
  font-family:'JetBrains Mono',monospace; white-space:nowrap;
}
.mkt-table td:first-child { font-family:'Inter',sans-serif; font-weight:500; }
.mkt-table tr:last-child td { border-bottom:none; }
.name-cell { font-size:12px; }
.name-cell code { font-size:10px; color:var(--text-muted); font-weight:400; display:block; }
.up { color: var(--red); font-weight:600; }
.down { color: var(--green); font-weight:600; }
.flat { color: var(--text-dim); }
/* ─── STOCK ROW ─── */
.stock-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom:1px solid rgba(229,221,213,0.4);
}
.stock-row:last-child { border-bottom:none; }
.stock-info { display:flex; align-items:center; gap:10px; }
.stock-tag { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.stock-name { font-weight:600; font-size:13px; }
.stock-code { font-size:10px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-top:1px; }
.stock-price { text-align:right; }
.stock-price .price { font-size:14px; font-weight:600; font-family:'JetBrains Mono',monospace; }
.stock-price .change { font-size:11px; font-family:'JetBrains Mono',monospace; }
/* ─── PICKS ─── */
.picks-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
@media (max-width: 900px) { .picks-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 500px) { .picks-grid { grid-template-columns: 1fr; } }
.pick-item {
  background: var(--bg-alt); border:1px solid var(--border);
  border-radius:8px; padding:12px; text-align:center; transition: border-color 0.2s;
}
.pick-item:hover { border-color: var(--border-light); }
.pick-item .rank { font-size:10px; font-weight:700; color:var(--gold); margin-bottom:5px; letter-spacing:0.5px; }
.pick-item .pname { font-size:14px; font-weight:600; }
.pick-item .pcode { font-size:10px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
.pick-item .pperf { font-size:20px; font-weight:700; margin:6px 0 3px; }
.pick-item .buy-in { font-size:11px; color:var(--gold); font-weight:500; margin-top:5px; }
.pick-item .reason { font-size:11px; color:var(--text-dim); margin-top:5px; line-height:1.4; border-top:1px solid var(--border); padding-top:5px; }
/* ─── SECTORS ─── */
.sector-list { display:flex; flex-wrap:wrap; gap:8px; }
.sector-item {
  flex:1; min-width:80px;
  background: var(--bg-alt); border:1px solid var(--border);
  border-radius:6px; padding:10px; text-align:center;
}
.sector-item .sname { font-size:12px; font-weight:500; }
.sector-item .schg { font-size:16px; font-weight:700; margin-top:3px; font-family:'JetBrains Mono',monospace; }
/* ─── STRATEGY ─── */
.strategy-wrap { display:flex; gap:10px; flex-wrap:wrap; }
.strategy-block {
  flex:1; min-width:130px;
  background: var(--bg-alt); border:1px solid var(--border);
  border-radius:7px; padding:11px;
}
.strategy-block .slabel { font-size:10px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.strategy-block .svalue { font-size:14px; font-weight:600; }
.strategy-block .svalue.gold { color:var(--gold); }
.strategy-block .svalue.cyan { color:var(--cyan); }
.strategy-block .svalue.red { color:var(--red); }
/* ─── MORNING BRIEF ─── */
.brief-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 640px) { .brief-grid { grid-template-columns: 1fr; } }
.brief-block {
  background: var(--bg-alt); border:1px solid var(--border);
  border-radius:7px; padding:12px;
}
.brief-block .blabel { font-size:10px; color:var(--text-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
.brief-block .bval { font-size:15px; font-weight:600; line-height:1.5; }
.brief-block .bval.lg { font-size:22px; }
/* ─── TEMP METER ─── */
.temp-wrap { display:flex; align-items:center; gap:16px; }
.temp-ring { position:relative; width:72px; height:72px; flex-shrink:0; }
.temp-ring svg { width:72px; height:72px; transform:rotate(-90deg); }
.temp-ring .val { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:17px; font-weight:700; }
.temp-info .label { font-size:14px; font-weight:600; }
.temp-info .detail { font-size:11px; color:var(--text-dim); margin-top:3px; }
/* ─── SIGNAL LIST ─── */
.sig-list { list-style:none; }
.sig-list li { padding:4px 0; font-size:13px; display:flex; align-items:flex-start; gap:8px; line-height:1.5; }
.sig-dot { flex-shrink:0; margin-top:2px; color:var(--gold); }
/* ─── REVIEW ─── */
.review-header { font-size:11px; color:var(--text-dim); margin-bottom:10px; }
.review-grid { display:flex; flex-wrap:wrap; gap:6px; }
.review-chip {
  background:var(--bg-alt); border:1px solid var(--border);
  border-radius:6px; padding:7px 12px; min-width:85px; text-align:center;
}
.review-chip .rname { font-size:12px; font-weight:500; }
.review-chip .rchange { font-size:14px; font-weight:600; margin-top:2px; }
.review-chip .rverdict { font-size:10px; color:var(--text-dim); margin-top:1px; }
.review-note { font-size:11px; color:var(--text-dim); font-style:italic; margin-top:8px; }
/* ─── HISTORY ─── */
.history-summary { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:14px; }
.history-stat {
  flex:1; min-width:100px; text-align:center;
  background:var(--bg-alt); border:1px solid var(--border);
  border-radius:8px; padding:12px;
}
.history-stat .hnum { font-size:24px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.history-stat .hlabel { font-size:10px; color:var(--text-dim); margin-top:3px; text-transform:uppercase; letter-spacing:0.5px; }
.history-table { width:100%; border-collapse:collapse; font-size:12px; }
.history-table th {
  text-align:left; font-size:10px; font-weight:500;
  color:var(--text-muted); padding:6px 5px;
  border-bottom:1px solid var(--border); white-space:nowrap;
}
.history-table td {
  padding:6px 5px; border-bottom:1px solid rgba(229,221,213,0.4);
  font-family:'JetBrains Mono',monospace; font-size:11px;
}
.history-table td:first-child { font-family:'Inter',sans-serif; }
.history-table tr:last-child td { border-bottom:none; }
.history-empty { text-align:center; padding:20px; color:var(--text-dim); font-size:12px; }
.history-note { font-size:10px; color:var(--text-muted); margin-top:8px; text-align:right; }
/* ─── NORTH FLOW ─── */
.nflow-wrap { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.nflow-val { font-size:22px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.nflow-label { font-size:11px; color:var(--text-dim); }
/* ─── FOOTER ─── */
.footer {
  margin-top:20px; padding-top:12px;
  border-top:1px solid var(--border);
  display:flex; justify-content:space-between;
  font-size:10px; color:var(--text-muted); flex-wrap:wrap; gap:6px;
}
.loading {
  display:flex; align-items:center; justify-content:center;
  min-height:80px; color:var(--text-dim); font-size:12px;
}
.error-msg { color: var(--red); font-size: 12px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-left">
    <div class="logo">📊 A股智能监控</div>
    <span class="badge">宝宝看盘</span>
  </div>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span class="date" id="reportDate">加载中...</span>
    <span style="font-size:11px" id="reportTime">--:--</span>
    <button class="btn-refresh" id="btnRefresh" onclick="loadData()">⟳ 刷新</button>
  </div>
</div>

<!-- ═══ GRID ═══ -->
<div class="grid" id="app">

  <!-- 大盘概况（左）+ 盘前策略（右）-->
  <div class="card span-6" id="marketCard">
    <div class="card-title"><span class="icon">📈</span> 大盘概况</div>
    <div id="marketContent" class="loading"><span>⏳ 加载中...</span></div>
  </div>

  <div class="card span-6" id="briefCard">
    <div class="card-title"><span class="icon">🌅</span> 今日盘前策略 <span class="tag tag-blue">宝宝观点</span></div>
    <div id="briefContent" class="loading"><span>⏳ 加载中...</span></div>
  </div>

  <!-- 重点追踪（左）+ 宝宝板块观点（右）-->
  <div class="card span-6" id="portfolioCard">
    <div class="card-title"><span class="icon">🔍</span> 重点追踪 <span class="tag tag-blue">恒瑞建仓关注</span></div>
    <div id="portfolioContent" class="loading"><span>⏳ 加载中...</span></div>
  </div>

  <div class="card span-6" id="outlookCard">
    <div class="card-title"><span class="icon">🧠</span> 板块观点 <span class="tag tag-gold">方向预测</span></div>
    <div id="outlookContent" class="loading"><span>⏳ 加载中...</span></div>
  </div>

  <!-- 精选推荐 -->
  <div class="card span-12" id="picksCard">
    <div class="card-title"><span class="icon">🎯</span> 精选推荐 <span class="tag tag-gold">按涨跌幅排序</span></div>
    <div id="picksContent" class="loading"><span>⏳ 加载中...</span></div>
  </div>

  <!-- 底部三列：板块轮动 | 北向资金 | 市场温度 -->
  <div class="card span-4" id="sectorCard">
    <div class="card-title"><span class="icon">🏭</span> 热门板块 <span class="tag tag-blue">今日</span></div>
    <div id="sectorContent" class="loading">⏳ 加载中...</div>
  </div>

  <div class="card span-4" id="northFlowCard">
    <div class="card-title"><span class="icon">🌊</span> 北向资金</div>
    <div id="northFlowContent" class="loading">⏳ 加载中...</div>
  </div>

  <div class="card span-4" id="feelingCard">
    <div class="card-title"><span class="icon">🌡️</span> 市场温度</div>
    <div id="feelingContent" class="loading">⏳ 加载中...</div>
  </div>

  <!-- 底部两列：操作策略 | 关键信号 -->
  <div class="card span-6" id="strategyCard">
    <div class="card-title"><span class="icon">💡</span> 操作策略</div>
    <div id="strategyContent" class="loading">⏳ 加载中...</div>
  </div>

  <div class="card span-6" id="signalCard">
    <div class="card-title"><span class="icon">⚡</span> 关键信号</div>
    <div id="signalContent" class="loading">⏳ 加载中...</div>
  </div>

  <!-- 昨日回顾 -->
  <div class="card span-12" id="reviewCard">
    <div class="card-title"><span class="icon">🔄</span> 昨日推荐回顾</div>
    <div id="reviewContent" class="loading">⏳ 加载中...</div>
  </div>

  <!-- 宝宝历史战绩 -->
  <div class="card span-12" id="historyCard">
    <div class="card-title"><span class="icon">📜</span> 宝宝历史战绩 <span class="tag tag-gold">全量记录</span></div>
    <div id="historyContent" class="loading">⏳ 加载中...</div>
  </div>

</div>

<!-- ═══ FOOTER ═══ -->
<div class="footer">
  <span>数据来源: 腾讯财经 · 实时行情</span>
  <span>由宝宝自动更新 · 不构成投资建议</span>
</div>

<script>
// ═══════════════════════════════════════════
// 数据采集 — 腾讯 qt.gtimg.cn (CORS ✅)
// ═══════════════════════════════════════════

function toTencent(code, prefix) {
  if (prefix) return prefix + code;
  if (code.startsWith('6') || code.startsWith('9')) return 'sh' + code;
  return 'sz' + code;
}

const INDEX_CODES = [
  { code: '000001', name: '上证指数', prefix: 'sh' },
  { code: '399001', name: '深证成指', prefix: 'sz' },
  { code: '399006', name: '创业板指', prefix: 'sz' },
  { code: '000688', name: '科创50', prefix: 'sh' },
  { code: '000300', name: '沪深300', prefix: 'sh' },
  { code: '000016', name: '上证50', prefix: 'sh' },
];

const STOCK_CODES = [
  { code: '600276', name: '恒瑞医药', sector: '创新药', cost: 0, status: '关注建仓', buyZone: '55.50~56.50' },
  { code: '300059', name: '东方财富', sector: '券商/金融科技', cost: 0, status: '候选' },
  { code: '000333', name: '美的集团', sector: '家电', cost: 0, status: '候选' },
  { code: '601127', name: '赛力斯', sector: '新能源汽车', cost: 0, status: '候选' },
];

const PICK_CODES = [
  { code: '600276', name: '恒瑞医药', sector: '创新药', reason: '超跌反弹+防御属性，资金从科技切医药', buyZone: '55.50~56.50' },
  { code: '000333', name: '美的集团', sector: '家电', reason: 'PE14倍历史低位，50%分位安全边际充足', buyZone: '80.50~82.00' },
  { code: '300059', name: '东方财富', sector: '券商/金融科技', reason: '天量成交直接受益，PE24倍合理估值', buyZone: '19.50~20.00' },
  { code: '601127', name: '赛力斯', sector: '新能源汽车', reason: '华为问界热销+PE16倍低估', buyZone: '53.50~55.00' },
  { code: '603501', name: '豪威集团', sector: '芯片设计', reason: '半导体内部分化，设计强于封测', buyZone: '107.00~110.00' },
];

const SECTORS_FALLBACK = [
  { name: '创新药', change: 3.8 },
  { name: '家电', change: 1.2 },
  { name: '券商', change: 2.5 },
  { name: '新能源汽车', change: 4.1 },
  { name: '芯片设计', change: -1.3 },
];

async function fetchTencent(codes) {
  const qs = codes.map(c => toTencent(c.code, c.prefix)).join(',');
  const url = 'https://qt.gtimg.cn/q=' + qs;
  try {
    const resp = await fetch(url, { headers: { 'Referer': 'https://qt.gtimg.cn' }, cache: 'no-cache' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const buf = await resp.arrayBuffer();
    return parseTencentData(new TextDecoder('gbk').decode(buf));
  } catch (e) {
    try {
      const raw = await (await fetch(url, { cache: 'no-cache' })).text();
      return parseTencentData(raw);
    } catch (e2) { console.error('数据获取失败:', e2); return null; }
  }
}

function parseTencentData(raw) {
  const results = {};
  for (const line of raw.split('\n').filter(l => l.trim())) {
    try {
      const m = line.match(/v_(\w+)="(.+)"/);
      if (!m) continue;
      const vals = m[2].split('~');
      results[m[1].toLowerCase()] = {
        name: vals[1], price: parseFloat(vals[3]) || 0,
        prevClose: parseFloat(vals[4]) || 0,
        change: parseFloat(parseFloat(vals[32] || 0).toFixed(2)),
        high: parseFloat(vals[33]) || 0, low: parseFloat(vals[34]) || 0,
        volume: parseFloat(vals[6]) || 0,
        amount: (parseFloat(vals[37]) || 0) / 1000000,
      };
    } catch(e) {}
  }
  return results;
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════

const fmt = v => v.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
const cls = c => c>0?'up':c<0?'down':'flat';
const arrow = c => c>0?'▲':c<0?'▼':'—';
const sign = n => n>0?'+':'';

function renderMarket(data) {
  if (!data) { document.getElementById('marketContent').innerHTML = '<div class="error-msg">⚠️ 数据获取失败</div>'; return; }
  let h = '<table class="mkt-table"><thead><tr><th>指数</th><th>最新</th><th>涨跌幅</th><th>成交额</th></tr></thead><tbody>';
  for (const idx of INDEX_CODES) {
    const d = data[toTencent(idx.code, idx.prefix)];
    if (!d) continue;
    const amt = d.amount >= 10000 ? (d.amount/10000).toFixed(1)+'亿' : d.amount.toFixed(0)+'万';

function renderPortfolio(data) {
  if (!data) { document.getElementById('portfolioContent').innerHTML = '<div class="error-msg">⚠️ 数据获取失败</div>'; return; }
  let h = '';
  for (const st of STOCK_CODES) {
    const d = data[toTencent(st.code)];
    if (!d) continue;
    const c = cls(d.change);
    const perf = sign(d.change) + d.change.toFixed(2) + '%';
    const dotColor = d.change>0?'var(--red)':d.change<0?'var(--green)':'var(--text-dim)';
    let sub = '<div class="stock-code">'+st.code+' · '+(st.sector||st.status)+'</div>';
    if (st.cost) {
      const loss = ((d.price - st.cost) / st.cost * 100).toFixed(1);
      sub += '<div style="font-size:10px;color:var(--text-dim);margin-top:1px">成本 '+fmt(st.cost)+' · <span style="color:'+(loss<0?'var(--green)':'var(--red)')+'">'+(loss<0?'':'+')+loss+'%</span></div>';
    }
    if (st.buyZone && !st.cost) {
      const p = d.price, [low, high] = st.buyZone.split('~').map(Number);
      let hint = '';
      if (p >= low && p <= high) hint = '<span style="color:var(--red);font-weight:600">🎯 在买入区间内</span>';
      else if (p >= low*0.97 && p <= high*1.03) hint = '<span style="color:var(--gold)">👀 接近买入区间 ('+st.buyZone+')</span>';
      else if (p < low) hint = '<span style="color:var(--cyan);font-size:10px">📉 低于区间下限</span>';
      else hint = '<span style="font-size:10px;color:var(--text-dim)">📌 '+st.buyZone+'</span>';
      sub += '<div style="font-size:11px;margin-top:2px">'+hint+'</div>';
    }
    h += '<div class="stock-row"><div class="stock-info"><span class="stock-tag" style="background:'+dotColor+'"></span>'
      +'<div><div class="stock-name">'+st.name+'</div>'+sub+'</div></div>'
      +'<div class="stock-price"><div class="price '+c+'">'+fmt(d.price)+'</div><div class="change '+c+'">'+perf+'</div></div></div>';
  }
  document.getElementById('portfolioContent').innerHTML = h;
}

// 宝宝历史战绩初始种子数据（从过往报告提取）
const SEED_HISTORY = [
  { date: '2026-07-14', shPrice: 3967.13, shChange: 1.36, direction: '稳健上行', result: '✅ 对', kcChange: 0.77, cybChange: 3.43 },
  { date: '2026-07-13', shPrice: 3913.80, shChange: 0.92, direction: '震荡反弹', result: '✅ 对', kcChange: 1.85, cybChange: 1.62 },
  { date: '2026-07-10', shPrice: 3878.12, shChange: -0.34, direction: '震荡整理', result: '➖ 待验证', kcChange: -1.12, cybChange: -0.28 },
];

// 从 localStorage 读取历史记录（合并种子数据）
function loadHistory() {
  try {
    const raw = localStorage.getItem('baobao_history');
    if (raw) {
      const stored = JSON.parse(raw);
      // 如果localStorage已有数据，用已有的（避免重复覆盖种子）
      return stored;
    }
    // 首次使用：写入种子数据
    try { localStorage.setItem('baobao_history', JSON.stringify(SEED_HISTORY)); } catch(e) {}
    return SEED_HISTORY;
  } catch(e) { return []; }
}

// 保存今日记录到 localStorage
function saveTodayRecord(data) {
  const history = loadHistory();
  const today = new Date().toISOString().slice(0,10);
  // 避免重复保存同一天
  if (history.length > 0 && history[history.length-1].date === today) return;

  let sh = null, cyb = null, kc = null;
  if (data) {
    sh = data[toTencent('000001','sh')];
    cyb = data[toTencent('399006','sz')];
    kc = data[toTencent('000688','sh')];
  }
  const kcDown = kc && kc.change < -3;
  const cybDown = cyb && cyb.change < -1;
  const shUp = sh && sh.change > 0.3;

  let direction = '震荡整理', dirResult = '平';
  if (kcDown && cybDown) { direction = '防御为主'; dirResult = sh && sh.change > -0.5 ? '✅ 对' : '❌ 错'; }
  else if (sh && sh.change > 0.5 && sh.price > 3960) { direction = '震荡偏多'; dirResult = '✅ 对'; }
  else { dirResult = '➖ 待验证'; }

  const record = {
    date: today,
    shPrice: sh ? sh.price : 0,
    shChange: sh ? sh.change : 0,
    direction: direction,
    result: dirResult,
    kcChange: kc ? kc.change : 0,
    cybChange: cyb ? cyb.change : 0,
  };
  history.push(record);
  try { localStorage.setItem('baobao_history', JSON.stringify(history)); } catch(e) {}
}

function renderHistory() {
  const history = loadHistory();
  if (!history || history.length === 0) {
    document.getElementById('historyContent').innerHTML = '<div class="history-empty">📭 暂无历史记录 — 从今天开始，宝宝每次运行收盘报告时自动记录</div>';
    return;
  }

  // 统计
  const total = history.length;
  let correct = 0, wrong = 0;
  for (const r of history) {
    if (r.result === '✅ 对') correct++;
    else if (r.result === '❌ 错') wrong++;
  }
  const accRate = total > 0 ? (correct / (correct + wrong) * 100).toFixed(0) : '--';
  const maxShow = Math.min(history.length, 20);

  // 摘要行
  let h = '<div class="history-summary">'
    +'<div class="history-stat"><div class="hnum" style="color:var(--blue)">'+total+'</div><div class="hlabel">总交易日</div></div>'
    +'<div class="history-stat"><div class="hnum" style="color:var(--red)">'+correct+'</div><div class="hlabel">预测正确</div></div>'
    +'<div class="history-stat"><div class="hnum" style="color:var(--green)">'+wrong+'</div><div class="hlabel">预测错误</div></div>'
    +'<div class="history-stat"><div class="hnum" style="color:var(--gold)">'+(accRate !== '--' ? accRate+'%' : '--')+'</div><div class="hlabel">胜率</div></div>'
    +'</div>';

  // 表格（最近20条，倒序=最新在前）
  h += '<table class="history-table"><thead><tr>'
    +'<th>日期</th><th>上证</th><th>涨跌幅</th><th>宝宝判断</th><th>结果</th></tr></thead><tbody>';
  const reversed = [...history].reverse();
  for (let i = 0; i < Math.min(maxShow, reversed.length); i++) {
    const r = reversed[i];
    const shCls = cls(r.shChange);
    const resColor = r.result === '✅ 对' ? 'var(--red)' : r.result === '❌ 错' ? 'var(--green)' : 'var(--text-dim)';
    h += '<tr>'
      +'<td>'+r.date.slice(5)+'</td>'
      +'<td style="font-family:JetBrains Mono,monospace">'+r.shPrice.toFixed(2)+'</td>'
      +'<td class="'+shCls+'">'+(r.shChange>0?'+':'')+r.shChange.toFixed(2)+'%</td>'
      +'<td>'+r.direction+'</td>'
      +'<td style="color:'+resColor+';font-weight:600">'+r.result+'</td>'
      +'</tr>';
  }
  h += '</tbody></table>';
  h += '<div class="history-note">显示最近 '+maxShow+' 条 · 共 '+total+' 条记录 · 每次收盘报告自动追加</div>';
  document.getElementById('historyContent').innerHTML = h;
}

async function loadData() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true; btn.textContent = '⟳ 更新中...';
  const now = new Date();
  document.getElementById('reportDate').textContent = now.toISOString().slice(0,10);
  document.getElementById('reportTime').textContent = now.toTimeString().slice(0,5);

  const allCodes = [...INDEX_CODES, ...STOCK_CODES, ...PICK_CODES];
  const seen = new Set();
  const uniqueCodes = allCodes.filter(c => { if (seen.has(c.code)) return false; seen.add(c.code); return true; });
  const data = await fetchTencent(uniqueCodes);

  renderMarket(data);
  renderBrief(data);
  renderPortfolio(data);
  renderOutlook();
  renderPicks(data);
  renderSectors();
  renderNorthFlow();
  renderFeeling();
  renderStrategy();
  renderSignals();
  renderReview();
  saveTodayRecord(data);
  renderHistory();

  btn.disabled = false; btn.textContent = '⟳ 刷新';
}

loadData();
